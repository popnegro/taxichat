<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taxi Mendoza</title>
  
  <!-- Preconexión para reducir el tiempo de resolución DNS/TLS (Mejora LCP) -->
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://maps.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
    
    <style>
        :root {
            --primary: #fbc02d;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --accent: #25D366;
            --text: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 15px;
            text-rendering: optimizeSpeed;
        }

        #taxi-widget {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative; /* Para la pantalla de éxito absoluta */
        }

        .chat-header { 
            background: var(--primary); 
            padding: 20px; 
            text-align: center; 
            font-weight: 800;
            text-transform: uppercase;
        }

        .chat-body { 
            height: 400px; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #ffffff;
            overflow-anchor: auto; /* Evita saltos visuales al añadir mensajes (Mejora CLS) */
        }

        .bubble { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            animation: fadeIn 0.3s ease forwards;
            contain: content; /* Optimiza el renderizado de elementos aislados */
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .bot { background: var(--light); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #eee; }
        .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }

        .input-area { 
            padding: 20px; 
            background: #fff;
            border-top: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            min-height: 150px;
        }
        
        .status-info {
            font-size: 12px;
            color: #666;
            padding: 0 5px;
            min-height: 18px;
            font-style: italic;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 16px;
            outline: none;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            padding-left: 40px; /* Espacio para el ícono */
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #666; /* Color del ícono */
            font-size: 20px;
        }

        .btn { 
            background: var(--dark); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
        }

        .swap-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #swap-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border: 2px solid #eee;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        #swap-btn:active { transform: translateY(-50%) scale(0.9); }

        .btn-ws { 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            display: none; 
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* Animación de pulso para el botón de WhatsApp */
        .pulse-whatsapp {
            animation: pulse-whatsapp 1.5s infinite;
        }

        @keyframes pulse-whatsapp {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }



        /* PANTALLA DE ÉXITO */
        #success-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 10;
            display: none; /* Se activa por JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
            will-change: transform; /* Promueve a capa de GPU para evitar JANK (Mejora INP) */
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* ANIMACIÓN DE RADAR INLINE */
        .radar-small {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }
        .radar-small::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 1px solid var(--primary);
            border-radius: 50%;
            animation: radar-pulse 1.2s infinite;
        }
        @keyframes radar-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* DISEÑO DE PRECIO DESTACADO */
        .bubble.bot.price-highlight {
            background: var(--dark);
            color: white;
            border: none;
            max-width: 90%;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            padding: 20px;
        }
        .price-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .price-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 5px; }
        .price-total { font-size: 32px; font-weight: 900; color: var(--primary); margin: 5px 0; }
        .price-info { font-size: 12px; opacity: 0.7; }

        /* SKELETON SCREEN */
        .skeleton-bubble {
            width: 70%;
            height: 44px;
            background: var(--light);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
            margin-bottom: 12px;
        }

        .skeleton-bubble::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: skeleton-pulse 1.5s infinite;
        }

        @keyframes skeleton-pulse {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .icon-check { font-size: 64px; color: var(--accent); margin-bottom: 20px; }
        .success-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .success-text { color: #666; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.4; }

        .hidden { display: none !important; }

        /* FOOTER DE ENLACES */
        .widget-footer {
            padding: 12px 20px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 11px;
        }
        .widget-footer a {
            color: #999;
            text-decoration: none;
            transition: color 0.2s;
        }
        .widget-footer a:hover { color: var(--text); text-decoration: underline; }

        /* BOTÓN FLOTANTE DE AYUDA */
        .floating-help {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
            z-index: 100;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .floating-help:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="taxi-widget">
 <div class="chat-header">🚕 TaxiChat</div>
    
    <div class="chat-body" id="chat-content">
        <!-- Esqueletos iniciales -->
        <div class="skeleton-bubble"></div>
        <div class="skeleton-bubble" style="width: 50%;"></div>
    </div>

    <div class="input-area">
        <div id="status-info" class="status-info"></div>
        <div class="swap-container">
            <div class="input-wrapper">
                <span class="material-symbols-outlined input-icon" style="color: #4285F4;">trip_origin</span>
                <input type="text" id="origin" placeholder="Buscando ubicación...">
            </div>
            <button id="swap-btn" class="hidden" title="Intercambiar direcciones">
                <span class="material-symbols-outlined" style="font-size: 20px;">swap_vert</span>
            </button>
            <div class="input-wrapper hidden" id="destination-wrapper">
                <span class="material-symbols-outlined input-icon" style="color: #EA4335;">location_on</span>
                <input type="text" id="destination" placeholder="¿A dónde vas?">
            </div>
        </div>
        <button class="btn" id="next-btn">Continuar</button>
        <a href="#" class="btn-ws" id="ws-btn" target="_blank">Confirmar en WhatsApp</a>
    </div>

    <div class="widget-footer">
        <a href="#" id="back-btn" class="hidden">Editar datos</a>
        <a href="#">Términos y condiciones</a>
        <a href="#">Seguridad</a>
    </div>

    <div id="success-layer">
        <span class="material-symbols-outlined icon-check">check_circle</span>
        <h2 class="success-title">¡Pedido en camino!</h2>
        <p class="success-text">
            Hemos abierto WhatsApp para que coordines con el chofer. <br>
            <strong>ID de Seguimiento: <span id="lead-id">...</span></strong>
        </p>
        <button class="btn" id="close-success" style="background: #eee; color: #333; width: 100%;">
            Nuevo Viaje
        </button>
    </div>
</div>

<button class="floating-help" id="help-btn">
    <span class="material-symbols-outlined" style="font-size: 20px;">help</span>
    Ayuda
</button>

<script type="module" src="/js/app.js"></script>
</body>
</html>
