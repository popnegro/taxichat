<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taxi Mendoza</title>

  <link rel="preconnect" href="https://maps.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --primary: #fbc02d;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --accent: #25D366;
            --text: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 15px;
        }

        #taxi-widget {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative; /* Para la pantalla de éxito absoluta */
        }

        .chat-header { 
            background: var(--primary); 
            padding: 20px; 
            text-align: center; 
            font-weight: 800;
            text-transform: uppercase;
        }

        .chat-body { 
            height: 400px; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #ffffff;
        }

        .bubble { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: var(--light); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #eee; }
        .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }

        .input-area { 
            padding: 20px; 
            background: #fff;
            border-top: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            min-height: 150px;
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 16px;
            outline: none;
        }

        .btn { 
            background: var(--dark); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
        }

        .btn-ws { 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            display: none; 
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
        }

        /* PANTALLA DE ÉXITO */
        #success-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 10;
            display: none; /* Se activa por JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .icon-check { font-size: 64px; color: var(--accent); margin-bottom: 20px; }
        .success-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .success-text { color: #666; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.4; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
 <div class="chat-header">🚕 Central Mendoza</div>
    
    <div class="chat-body" id="chat-content">
        <div class="bubble bot">¡Hola! Soy tu asistente de viajes. Estoy detectando tu ubicación en Mendoza...</div>
    </div>

    <div class="input-area">
        <input type="text" id="origin" placeholder="📍 Buscando ubicación...">
        <input type="text" id="destination" class="hidden" placeholder="🏁 ¿A dónde vas?">
        <button class="btn" id="next-btn">Continuar</button>
        <a href="#" class="btn-ws" id="ws-btn" target="_blank">Confirmar en WhatsApp</a>
    </div>

    <div id="success-layer">
        <span class="material-symbols-outlined icon-check">check_circle</span>
        <h2 class="success-title">¡Pedido en camino!</h2>
        <p class="success-text">
            Hemos abierto WhatsApp para que coordines con el chofer. <br>
            <strong>ID de Seguimiento: <span id="lead-id">...</span></strong>
        </p>
        <button class="btn" onclick="location.reload()" style="background: #eee; color: #333; width: 100%;">
            Pedir otro Taxi
        </button>
    </div>
</div>
<script type="module" src="/js/app.js"></script>
</body>
</html>
