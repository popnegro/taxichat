<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiChat - Pasajero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-white">
        <div class="bg-yellow-400 p-6">
            <h2 class="text-2xl font-black text-yellow-900 italic">TAXI YA</h2>
            <p class="text-yellow-800 text-xs font-bold uppercase tracking-widest opacity-70">Mendoza Ciudad</p>
        </div>
        
        <div class="p-6 space-y-6">
            <div class="space-y-4">
                <input type="text" id="origen" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-yellow-400" placeholder="📍 ¿Dónde te buscamos?">
                <input type="text" id="destino" oninput="document.getElementById('price').innerText = '$' + (Math.floor(Math.random()*2000)+1500)" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-yellow-400" placeholder="🏁 ¿A dónde vas?">
                <input type="text" id="pasajero" class="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-yellow-400" placeholder="👤 Tu nombre">
            </div>

            <div class="bg-slate-900 rounded-2xl p-4 text-center">
                <span class="text-slate-400 text-[10px] block uppercase font-bold tracking-widest mb-1">Tarifa Estimada</span>
                <span id="price" class="text-2xl font-black text-yellow-400">$ 0.00</span>
            </div>

            <button onclick="enviarViaje()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                PEDIR COCHE AHORA
            </button>
        </div>
    </div>

    <script>
        const socket = io({ path: '/api/socket', transports: ['polling'] });
        
        function enviarViaje() {
            const data = {
                origen: document.getElementById('origen').value,
                destino: document.getElementById('destino').value,
                pasajero: document.getElementById('pasajero').value,
                tarifa: document.getElementById('price').innerText,
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            if(data.origen && data.destino && data.pasajero) {
                socket.emit('nuevo-viaje', data);
                alert("¡Solicitud enviada! Esperando conductor...");
            }
        }
    </script>
</body>
</html>
