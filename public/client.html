<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>taxichat - Pasajero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root { --brand: #000; }
        .bg-brand { background-color: var(--brand); }
        .text-brand { color: var(--brand); }
        .border-brand { border-color: var(--brand); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-brand p-6 text-white text-center">
            <img id="logo-img" src="" class="h-12 mx-auto mb-2 hidden" alt="Logo">
            <h1 id="empresa-nombre" class="text-xl font-bold tracking-tight">taxichat</h1>
        </div>

        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tu Nombre</label>
                <input type="text" id="userName" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition" placeholder="Ej: Juan Pérez">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Origen</label>
                <input type="text" id="origin" readonly class="w-full px-4 py-3 rounded-xl border border-gray-100 bg-gray-50 text-gray-500 text-sm cursor-not-allowed" placeholder="Detectando ubicación...">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">¿A dónde vas?</label>
                <input type="text" id="destination" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none transition" placeholder="Ingresa destino">
            </div>

            <div id="estimate-box" class="bg-blue-50 p-3 rounded-xl text-blue-700 text-sm font-medium hidden"></div>

            <button id="btnRequest" onclick="solicitarTaxi()" class="bg-brand w-full py-4 text-white font-bold rounded-xl shadow-lg hover:opacity-90 active:scale-95 transition-all uppercase tracking-wide">
                Solicitar Taxi Ahora
            </button>

            <div id="status-panel" class="hidden mt-6 p-4 bg-gray-50 rounded-xl border-l-4 border-brand">
                <p class="text-xs uppercase text-gray-500 font-bold mb-1">Estado del viaje</p>
                <p id="driver-info" class="text-gray-800 font-medium italic">Buscando chofer cercano...</p>
                <div id="payment-area" class="mt-4"></div>
            </div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
    let socket;
    let empresaId = null;
    let autocomplete;

    // 1. Inicialización de Marca Blanca y Socket
    async function inicializarSaaS() {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('v');

        if (!slug) {
            document.body.innerHTML = "<h1>Error: Empresa no especificada</h1>";
            return;
        }

        try {
            const res = await fetch(`/api/config/${slug}`);
            const config = await res.json();

            if (!config) throw new Error("Empresa no encontrada");

            // Guardamos ID de la empresa
            empresaId = config._id;

            // Aplicamos UI
            document.getElementById('empresa-titulo').innerText = config.nombre;
            document.title = `Taxi - ${config.nombre}`;
            document.documentElement.style.setProperty('--primary', config.config.color || '#000');
            document.documentElement.style.setProperty('--accent', config.config.color || '#009ee3');
            
            if (config.logo) {
                const img = document.getElementById('empresa-logo');
                img.src = config.logo;
                img.style.display = 'inline-block';
            }

            // Conexión Socket para Vercel
            socket = io({
                path: '/api/socket',
                query: { empresaId: config._id },
                transports: ['polling', 'websocket']
            });

            configurarEscuchas();

        } catch (error) {
            console.error(error);
            alert("Error al cargar la configuración de la empresa.");
        }
    }

    // 2. Lógica de Sockets (Escuchas)
    function configurarEscuchas() {
        socket.on('confirmacion-cliente', (data) => {
            document.getElementById('driver-info').innerHTML = 
                `✅ <b>${data.chofer}</b> está en camino.<br>Llega en aproximadamente <b>${data.tiempoEstimado || 5} min</b>.`;
        });

        socket.on('recibir-pago', (data) => {
            document.getElementById('payment-area').innerHTML = `
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <p>Paga tu viaje de forma segura:</p>
                <a href="${data.link}" target="_blank">PAGAR $${data.monto}</a>
            `;
        });
    }

    // 3. Funciones de Interfaz
    function solicitarTaxi() {
        const user = document.getElementById('userName').value;
        const dest = document.getElementById('destination').value;
        const origin = document.getElementById('origin').value;
        
        if (!user || !dest) return alert("Por favor, ingresa tu nombre y destino");

        document.getElementById('status-panel').style.display = 'block';
        document.getElementById('btnRequest').disabled = true;
        document.getElementById('btnRequest').innerText = "ESPERANDO CHOFER...";
        
        socket.emit('nuevo-pedido', { 
            usuario: user, 
            destino: dest,
            origen: origin,
            timestamp: new Date().getTime()
        });
    }

    // 4. Google Maps & Geolocation
    function initMaps() {
        const destInput = document.getElementById('destination');
        autocomplete = new google.maps.places.Autocomplete(destInput);
        
        autocomplete.addListener('place_changed', () => {
            const place = autocomplete.getPlace();
            if (!place.geometry) return;
            const dist = (Math.random() * 8 + 2).toFixed(1);
            const price = (dist * 150 + 400).toFixed(0);
            document.getElementById('estimate-box').innerHTML = 
                `Distancia: ${dist}km | <span class="price-tag">Est: $${price}</span>`;
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('origin').value = `Mi ubicación (${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)})`;
            });
        }
    }

    // LocalStorage para el nombre
    document.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById('userName');
        nameInput.value = localStorage.getItem('userTaxiName') || '';
        nameInput.addEventListener('input', () => localStorage.setItem('userTaxiName', nameInput.value));
        inicializarSaaS();
    });
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI&libraries=places&callback=initMaps"></script>

</body>
</html>
