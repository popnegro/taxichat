<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TaxiChat - SuperAdmin</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-box { background: #2d3748; padding: 40px; border-radius: 15px; border: 2px solid #ed8936; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        h1 { color: #ed8936; font-size: 24px; }
        .status { margin-top: 20px; font-size: 11px; color: #a0aec0; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>Control Maestro</h1>
        <p>Solo personal autorizado</p>
        
        <div id="g_id_onload" data-context="signin" data-ux_mode="popup" data-callback="verifyAdmin" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large"></div>
        
        <div class="status" id="sys-msg">Conectando con el núcleo...</div>
    </div>

    <script>
        async function loadConfig() {
            const res = await fetch('/api/config/default');
            const config = await res.json();
            if (config.googleClientId) {
                document.getElementById('g_id_onload').setAttribute('data-client_id', config.googleClientId);
                document.getElementById('sys-msg').innerText = "Sistema listo para autenticación.";
            }
        }

        async function verifyAdmin(response) {
            const res = await fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential, role: 'admin' })
            });

            const data = await res.json();
            if (data.success) {
                sessionStorage.setItem('admin_access', 'true');
                window.location.href = '/admin/dashboard.html';
            } else {
                alert("ERROR: Credenciales sin privilegios de SuperAdmin.");
            }
        }

        window.onload = loadConfig;
    </script>
</body>
</html>
