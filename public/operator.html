<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiChat - Panel de Operador</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h2 { color: #333; margin-bottom: 10px; }
        #map-status { font-size: 12px; color: #666; margin-top: 15px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="login-card">
        <h2>Operadores</h2>
        <p>Inicia sesión para gestionar la flota</p>
        <div id="loader" class="loader"></div>
        
        <div id="g_id_onload" data-context="signin" data-ux_mode="popup" data-callback="handleLogin" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        
        <div id="map-status">Cargando módulos de Maps...</div>
    </div>

    <script>
        async function init() {
            try {
                const res = await fetch('/api/config/default');
                const config = await res.json();

                if (config.error) throw new Error(config.error);

                // 1. Configurar ID de Cliente para Google Login
                document.getElementById('g_id_onload').setAttribute('data-client_id', config.googleClientId);

                // 2. Cargar Google Maps dinámicamente
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${config.googleMapsKey}&libraries=places`;
                script.onload = () => {
                    document.getElementById('map-status').innerText = "Maps cargado correctamente";
                    document.getElementById('loader').style.display = 'none';
                };
                document.head.appendChild(script);

            } catch (err) {
                console.error("Error al inicializar:", err);
                document.getElementById('map-status').innerHTML = "<b style='color:red'>Error de configuración. Revisa Vercel.</b>";
            }
        }

        async function handleLogin(response) {
            const result = await fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential, role: 'operator' })
            });

            const data = await result.json();
            if (data.success) {
                window.location.href = '/panel-operador.html';
            } else {
                alert("Acceso denegado: " + data.message);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
