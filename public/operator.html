<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxiChat - Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">CENTRAL <span class="text-yellow-400">DESPACHO</span></h1>
                <p id="status" class="text-[10px] font-bold text-emerald-500 uppercase">● Conectado al Núcleo</p>
            </div>
            <div class="text-right">
                <p class="text-slate-500 text-xs">Viajes Pendientes</p>
                <p id="count" class="text-3xl font-black text-white">0</p>
            </div>
        </header>

        <div id="panel" class="grid gap-4">
            <div id="msg" class="text-center py-20 border-2 border-dashed border-slate-800 rounded-3xl text-slate-600">
                Esperando nuevas solicitudes...
            </div>
        </div>
    </div>

    <script>
        const socket = io({ path: '/api/socket', transports: ['polling'] });
        let counter = 0;

        socket.on('viaje-recibido', (data) => {
            if(document.getElementById('msg')) document.getElementById('msg').remove();
            counter++;
            document.getElementById('count').innerText = counter;

            const card = document.createElement('div');
            card.className = "bg-slate-900 border border-slate-800 p-6 rounded-3xl flex justify-between items-center animate-pulse border-l-4 border-l-yellow-400";
            card.innerHTML = `
                <div>
                    <p class="text-xs text-slate-500 font-bold mb-1">${data.timestamp} - ${data.pasajero}</p>
                    <p class="text-lg font-bold text-white">${data.origen} ⮕ ${data.destino}</p>
                </div>
                <div class="text-right">
                    <p class="text-xl font-black text-yellow-400 mb-2">${data.tarifa}</p>
                    <button onclick="this.parentElement.parentElement.remove()" class="bg-emerald-500 text-emerald-950 px-4 py-2 rounded-xl text-xs font-black hover:bg-emerald-400 transition-colors">ACEPTAR</button>
                </div>
            `;
            document.getElementById('panel').prepend(card);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play();
        });
    </script>
</body>
</html>
