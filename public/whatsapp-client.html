<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id={{GA_ID}}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{GA_ID}}');
    </script>

    <!-- SEO DINÁMICO -->
    <title>{{SEO_TITLE}} - Pedir por WhatsApp</title>
    <meta name="description" content="{{SEO_DESCRIPTION}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    <meta name="theme-color" content="{{BRAND_COLOR}}">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Google Maps SDK inyectado por el servidor -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{GOOGLE_MAPS_KEY}}" async defer></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .whatsapp-green { background-color: #25D366; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header Marca Blanca -->
        <div id="header" class="p-6 text-center text-white" style="background-color: {{BRAND_COLOR}};">
            <h1 id="brand-name" class="text-2xl font-bold">TaxiChat</h1>
            <p class="text-sm opacity-90 text-white">Reserva rápida vía WhatsApp</p>
        </div>

        <!-- Formulario -->
        <div class="p-6 space-y-4">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Tu nombre</label>
                <input type="text" id="user-name" placeholder="Ej: Luis Grasso" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Origen</label>
                <div class="relative">
                    <input type="text" id="origin-input" placeholder="¿Dónde te buscamos?" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
                    <button onclick="getGeoLocation()" class="absolute right-3 top-3.5 text-green-600">📍</button>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Destino</label>
                <input type="text" id="destination-input" placeholder="¿A dónde vas?" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Método de Pago</label>
                <select id="payment-method" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all appearance-none">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Mercado Pago">Mercado Pago</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
            </div>

            <div id="estimation-box" class="hidden p-4 bg-green-50 rounded-xl border border-green-100 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-green-600 font-black uppercase">Tarifa Estimada</p>
                    <p id="estimated-price" class="text-xl font-bold text-green-800">$0.00</p>
                </div>
                <div class="text-right text-xs text-gray-500">
                    <p id="distance-text">0 km</p>
                </div>
            </div>

            <button id="btn-whatsapp" onclick="sendWhatsApp()" class="w-full py-4 whatsapp-green text-white font-black rounded-xl shadow-lg flex items-center justify-center gap-2 transform active:scale-95 transition-all">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.891 11.887-11.891 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.481 8.403 0 6.556-5.332 11.89-11.888 11.89-.001 0-.001 0 0 0-2.003 0-3.967-.505-5.717-1.46l-6.175 1.679zm5.992-3.485c1.559.925 3.327 1.414 5.132 1.415h.005c5.393 0 9.779-4.385 9.779-9.778 0-2.613-1.018-5.068-2.866-6.918-1.848-1.85-4.305-2.868-6.914-2.868-5.391 0-9.777 4.386-9.777 9.78 0 1.899.544 3.75 1.573 5.36l-1.106 4.04 4.116-1.121zm12.577-7.235c-.069-.115-.253-.184-.529-.322-.276-.138-1.631-.804-1.885-.896-.253-.092-.437-.138-.621.138-.184.276-.713.896-.874 1.08-.161.184-.322.207-.598.069-.276-.138-1.166-.43-2.221-1.37-.82-.731-1.374-1.634-1.535-1.91-.161-.276-.017-.424.12-.563.125-.124.276-.322.414-.483.138-.161.184-.276.276-.46.092-.184.046-.345-.023-.483-.069-.138-.621-1.495-.851-2.047-.224-.54-.449-.467-.621-.476-.161-.009-.345-.011-.529-.011-.184 0-.483.069-.736.345-.253.276-.966.943-.966 2.299 0 1.356.989 2.667 1.127 2.851.138.184 1.944 2.969 4.707 4.16.657.283 1.17.452 1.569.578.66.21 1.261.18 1.735.109.529-.08 1.631-.667 1.861-1.31.23-.644.23-1.195.161-1.31z"/></svg>
                PEDIR POR WHATSAPP
            </button>
        </div>
    </div>

    <script>
        let empresaData = null;
        const slug = new URLSearchParams(window.location.search).get('slug') || 'default';

        async function init() {
            try {
                const res = await fetch(`/api/config/${slug}`);
                empresaData = await res.json();
                document.getElementById('brand-name').innerText = empresaData.nombre;
                document.getElementById('header').style.backgroundColor = empresaData.config.color;
            } catch (e) {
                console.error("Error al cargar configuración");
            }
        }

        function setupAutocomplete() {
            const mendozaBounds = new google.maps.LatLngBounds(
                new google.maps.LatLng(-37.5, -70.5),
                new google.maps.LatLng(-32.0, -66.5)
            );
            const options = { 
                types: ['address'], 
                componentRestrictions: { country: 'AR' },
                bounds: mendozaBounds,
                strictBounds: true 
            };
            const originAuto = new google.maps.places.Autocomplete(document.getElementById('origin-input'), options);
            const destAuto = new google.maps.places.Autocomplete(document.getElementById('destination-input'), options);
            [originAuto, destAuto].forEach(auto => auto.addListener('place_changed', calculatePrice));
        }

        function getGeoLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const geocoder = new google.maps.Geocoder();
                    geocoder.geocode({ location: { lat: position.coords.latitude, lng: position.coords.longitude } }, (results, status) => {
                        if (status === "OK" && results[0]) document.getElementById('origin-input').value = results[0].formatted_address;
                    });
                });
            }
        }

        function calculatePrice() {
            const origin = document.getElementById('origin-input').value;
            const dest = document.getElementById('destination-input').value;
            if (origin && dest) {
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({ origins: [origin], destinations: [dest], travelMode: 'DRIVING' }, (response, status) => {
                    if (status === "OK") {
                        const data = response.rows[0].elements[0];
                        if (data.status === "OK") {
                            const price = (data.distance.value / 1000 * 500) + 200;
                            document.getElementById('distance-text').innerText = data.distance.text;
                            document.getElementById('estimated-price').innerText = `$${price.toFixed(2)}`;
                            document.getElementById('estimation-box').classList.remove('hidden');
                        }
                    }
                });
            }
        }

        function sendWhatsApp() {
            const name = document.getElementById('user-name').value;
            const origin = document.getElementById('origin-input').value;
            const dest = document.getElementById('destination-input').value;
            const payment = document.getElementById('payment-method').value;
            const price = document.getElementById('estimated-price').innerText;

            if (!name || !origin || !dest) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            // Obtenemos el teléfono de la configuración o usamos uno por defecto
            const phone = empresaData?.config?.telephone || "549261000000"; 
            
            const message = `🚕 *NUEVO PEDIDO TAXICHAT*%0A%0A` +
                            `👤 *Pasajero:* ${name}%0A` +
                            `📍 *Origen:* ${origin}%0A` +
                            `🏁 *Destino:* ${dest}%0A` +
                            `💳 *Pago:* ${payment}%0A` +
                            `💰 *Tarifa Estimada:* ${price}%0A%0A` +
                            `_Enviado desde la App Web de ${empresaData?.nombre || 'TaxiChat'}_`;

            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }

        window.onload = init;
        window.initMap = setupAutocomplete;
    </script>
</body>
</html>
