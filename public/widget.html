<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaxiGO | Silver Edition | Mendoza</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        silver: {
                            50: '#F9FAFB', 100: '#F3F4F6', 200: '#E5E7EB',
                            300: '#D1D5DB', 400: '#9CA3AF', 500: '#6B7280',
                            600: '#4B5563', 700: '#374151', 800: '#1F2937',
                            900: '#111827', black: '#0A0A0A'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .step-hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .leaflet-container { filter: grayscale(1) contrast(1.1); border-radius: 1.5rem; z-index: 10; border: 1px solid #E5E7EB; }
        input:focus { border-color: #0A0A0A !important; box-shadow: 0 0 0 4px rgba(0,0,0,0.02); outline: none; }
        
        /* Ajuste para evitar que el teclado mobile rompa el layout */
        @media (max-width: 640px) {
            h1 { font-size: 2.75rem !important; line-height: 1 !important; }
            .p-8 { padding: 1.5rem !important; }
        }
    </style>
</head>
<body class="bg-white text-silver-900 antialiased selection:bg-silver-900 selection:text-white">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-[100] px-6 py-4 border-b border-silver-100">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-silver-black flex items-center justify-center rounded-xl shadow-lg">
                    <i data-lucide="taxi" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-[900] tracking-tighter uppercase italic">TaxiGO <span class="text-silver-400 font-normal">SILVER</span></span>
            </div>
            <div id="user-display" class="hidden flex items-center gap-3 bg-silver-50 px-4 py-2 rounded-full border border-silver-100">
                <span id="nav-user-name" class="text-[10px] font-black uppercase tracking-widest text-silver-600">MDZ</span>
                <button onclick="UserSession.logout()" class="text-silver-400"><i data-lucide="log-out" class="w-3 h-3"></i></button>
            </div>
        </div>
    </nav>

<main class="min-h-screen pt-24 pb-12 px-4 md:px-8 max-w-7xl mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-16 items-start lg:items-center">
        
        <div class="space-y-6 lg:space-y-10 text-center lg:text-left">
            <div class="space-y-4 lg:space-y-6">
                <div class="inline-flex items-center gap-2 bg-silver-100 px-4 py-1.5 rounded-full">
                    <span class="w-1.5 h-1.5 bg-silver-black rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-silver-600">Mendoza Hub Activo</span>
                </div>
                <h1 class="text-5xl md:text-8xl font-black tracking-tighter leading-[0.9] uppercase italic text-silver-black">
                    Standard <br class="hidden lg:block">
                    <span class="text-silver-300 italic">Premium.</span><br>
                    Tarifa <span class="bg-silver-black text-white px-4 py-1 rounded-2xl not-italic">Fix.</span>
                </h1>
            </div>
        </div>

        <div class="relative w-full max-w-md mx-auto lg:mr-0">
            <div class="bg-white border border-silver-200 shadow-2xl rounded-[2.5rem] overflow-hidden">
                <div class="bg-silver-black px-8 py-5 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full"></div>
                        <span class="text-[9px] font-black uppercase tracking-[0.2em] text-white/60">Servicio WaaS</span>
                    </div>
                </div>

                <div class="p-6 md:p-8">
                    <section id="step-1" class="fade-in space-y-6">
                        <div id="google-auth-ui" class="bg-silver-50 p-6 text-center border border-silver-100 rounded-3xl transition-all">
                            <div id="g_id_onload" 
                                 data-client_id="816836070332-4gp6tk77iru9368fvk33318gqrcck11.apps.googleusercontent.com" 
                                 data-callback="handleGoogleLogin" 
                                 data-auto_prompt="false"
                                 data-loglevel="error"></div> 
                            <div class="g_id_signin flex justify-center" data-type="standard" data-shape="pill" data-theme="outline"></div>
                            <p id="g-error-msg" class="hidden text-[10px] text-silver-400 mt-3 font-medium uppercase tracking-tighter">O ingresa tus datos manualmente</p>
                        </div>

                        <div class="space-y-4">
                            <input type="text" id="userName" placeholder="Nombre completo" class="w-full px-5 py-4 bg-silver-50 border border-silver-200 rounded-2xl font-bold text-sm">
                            <div class="flex gap-2">
                                <input type="text" id="origin" placeholder="Origen..." class="flex-1 px-5 py-4 bg-silver-50 border border-silver-200 rounded-2xl font-bold text-sm">
                                <button onclick="getLocation()" class="bg-silver-black text-white px-5 rounded-2xl active:scale-90 transition-transform">
                                    <i data-lucide="map-pin" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <div class="relative">
                                <input type="text" id="destination" oninput="searchMendoza(this.value)" placeholder="¿Hacia dónde vas?" class="w-full px-5 py-4 bg-silver-50 border border-silver-200 rounded-2xl font-bold text-sm">
                                <div id="results" class="hidden absolute top-full left-0 right-0 bg-white border border-silver-200 shadow-2xl rounded-2xl z-[1000] max-h-48 overflow-y-auto mt-2"></div>
                            </div>
                        </div>

                        <button onclick="toStep2()" class="w-full bg-silver-black text-white py-5 font-black uppercase text-xs tracking-widest rounded-2xl flex items-center justify-center gap-3 active:scale-[0.97] transition-all">
                            Confirmar Ruta <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </section>

                    <section id="step-2" class="step-hidden fade-in space-y-6">
                        <div class="text-center py-8 bg-silver-50 rounded-3xl border border-silver-100">
                            <span class="text-[10px] font-black uppercase text-silver-400">Tarifa Estimada</span>
                            <h3 id="display-price" class="text-5xl md:text-6xl font-black italic mt-1">$0</h3>
                        </div>
                        <div id="map" class="h-[200px] md:h-[220px] w-full border border-silver-200"></div>
                        <button onclick="sendToWhatsApp()" class="w-full bg-emerald-500 text-white py-5 font-black uppercase text-xs tracking-widest rounded-2xl shadow-lg flex items-center justify-center gap-3 active:scale-[0.97] transition-all">
                            Enviar Pedido <i data-lucide="message-circle" class="w-5 h-5 fill-white"></i>
                        </button>
                    </section>

                    <section id="step-3" class="step-hidden fade-in py-12 text-center space-y-6">
                        <i data-lucide="check-circle" class="w-16 h-16 text-emerald-500 mx-auto"></i>
                        <h2 class="text-2xl font-black uppercase italic text-silver-black">Pedido Enviado</h2>
                        <button onclick="location.reload()" class="px-8 py-3 bg-silver-100 text-silver-900 rounded-full font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Nuevo Viaje</button>
                    </section>
                </div>
            </div>
        </div>
    </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.372.0/dist/umd/lucide.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const CONFIG = {
            rates: { flag: 1200, km: 650 },
            agency: { phone: "5492610000000", bounds: "-68.9000,-33.0500,-68.7500,-32.8000" }
        };

        let map, orderData = { start: null, end: null, price: 0 };

        const refreshIcons = () => { if(window.lucide) lucide.createIcons(); };

        const UserSession = {
            init() {
                const n = localStorage.getItem('taxi_user');
                if (n) {
                    document.getElementById('userName').value = n;
                    const navDisp = document.getElementById('user-display');
                    document.getElementById('nav-user-name').innerText = n.split(' ')[0].toUpperCase();
                    navDisp.classList.remove('hidden');
                    navDisp.classList.add('md:flex');
                }
            },
            save(n) { localStorage.setItem('taxi_user', n); },
            logout() { localStorage.clear(); location.reload(); }
        };

        window.handleGoogleLogin = (r) => {
            const p = JSON.parse(atob(r.credential.split('.')[1]));
            UserSession.save(p.name);
            location.reload();
        };

        window.getLocation = function() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                orderData.start = [pos.coords.latitude, pos.coords.longitude];
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    document.getElementById('origin').value = data.address.road || "Ubicación GPS";
                } catch(e) { document.getElementById('origin').value = "Ubicación Detectada"; }
            });
        };

        async function searchMendoza(q) {
            const resEl = document.getElementById('results');
            if (q.length < 3) return resEl.classList.add('hidden');
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q + ", Mendoza")}&viewbox=${CONFIG.agency.bounds}&bounded=1&limit=4`);
            const data = await res.json();
            resEl.innerHTML = data.map(i => `<div class="p-4 hover:bg-silver-50 cursor-pointer border-b border-silver-100 text-xs font-black uppercase text-silver-900" onclick="setDest('${i.display_name.split(',')[0]}', ${i.lat}, ${i.lon})">${i.display_name.split(',')[0]}</div>`).join('');
            resEl.classList.remove('hidden');
        }

        function setDest(n, lat, lon) {
            document.getElementById('destination').value = n;
            orderData.end = [parseFloat(lat), parseFloat(lon)];
            document.getElementById('results').classList.add('hidden');
        }

        function changeStep(s) {
            document.querySelectorAll('section').forEach(sec => sec.classList.add('step-hidden'));
            document.getElementById(`step-${s}`).classList.remove('step-hidden');
            setTimeout(refreshIcons, 50);
        }

        async function toStep2() {
            const name = document.getElementById('userName').value;
            if (!orderData.end || !orderData.start) return alert("Completa origen y destino");
            if (!name) return alert("Ingresa tu nombre");
            
            UserSession.save(name);
            changeStep(2);

            if (map) map.remove();
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(orderData.start, 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${orderData.start[1]},${orderData.start[0]};${orderData.end[1]},${orderData.end[0]}?overview=full&geometries=geojson`);
            const data = await res.json();
            if (data.routes && data.routes[0]) {
                const r = data.routes[0];
                L.geoJSON(r.geometry, { style: { color: '#0A0A0A', weight: 4 } }).addTo(map);
                orderData.price = Math.round(CONFIG.rates.flag + ((r.distance / 1000) * CONFIG.rates.km));
                document.getElementById('display-price').innerText = `$${orderData.price.toLocaleString('es-AR')}`;
                map.fitBounds(L.geoJSON(r.geometry).getBounds(), { padding: [40, 40] });
            }
        }

        function sendToWhatsApp() {
            const user = localStorage.getItem('taxi_user') || "Cliente";
            const msg = `*PEDIDO TAXI SILVER*\n👤 ${user}\n📍 Origen: ${document.getElementById('origin').value}\n🏁 Destino: ${document.getElementById('destination').value}\n💰 Tarifa Est: $${orderData.price}`;
            window.open(`https://wa.me/${CONFIG.agency.phone}?text=${encodeURIComponent(msg)}`, '_blank');
            changeStep(3);
        }

        document.addEventListener('DOMContentLoaded', () => {
            UserSession.init();
            refreshIcons();
            setTimeout(getLocation, 1000);
            
            // Fail-safe para Google GSI
            setTimeout(() => {
                if (!document.querySelector('iframe[id^="gsi_"]')) {
                    document.getElementById('g-error-msg')?.classList.remove('hidden');
                }
            }, 3000);
        });
    </script>
</body>
</html>
