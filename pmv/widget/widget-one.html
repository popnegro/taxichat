<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Mendoza - Reserva Inteligente</title>
    <style>
        :root {
            --primary: #fbc02d; /* Amarillo Taxi */
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --accent: #25D366; /* WhatsApp Green */
            --text: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 15px;
        }

        /* Contenedor White-Label */
        #taxi-widget {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header { 
            background: var(--primary); 
            padding: 20px; 
            text-align: center; 
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .chat-body { 
            height: 400px; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: #ffffff;
        }

        .bubble { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { background: var(--light); align-self: flex-start; border-bottom-left-radius: 4px; color: var(--text); border: 1px solid #eee; }
        .user { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }

        .input-area { 
            padding: 20px; 
            background: #fff;
            border-top: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #eee; 
            border-radius: 12px; 
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .btn { 
            background: var(--dark); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-ws { 
            background: var(--accent); 
            color: white; 
            text-decoration: none; 
            text-align: center; 
            display: none; 
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .status-loading { font-size: 12px; color: #999; margin-left: 5px; }

        /* Estilo para el dropdown de Google para que encaje con el diseño */
        .pac-container {
            border-radius: 12px;
            margin-top: 5px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border: none;
            font-family: inherit;
        }
    </style>
</head>
<body>

<div id="taxi-widget">
    <div class="chat-header">🚕 Central Mendoza</div>
    
    <div class="chat-body" id="chat-content">
        <div class="bubble bot">¡Hola! Soy tu asistente de viajes. Estoy detectando tu ubicación en Mendoza...</div>
    </div>

    <div class="input-area" id="controls">
        <input type="text" id="origin" placeholder="📍 Buscando tu ubicación...">
        <input type="text" id="destination" placeholder="🏁 ¿A dónde vas en Mendoza?" style="display:none;">
        <button class="btn" id="next-btn" onclick="processStep()">Continuar</button>
        <a href="#" class="btn btn-ws" id="ws-btn" target="_blank">Pedir Taxi vía WhatsApp</a>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const API_KEY = "AIzaSyAmTzHBhtQ4E8BG6DL0xdrEOYdZmQEBXkI"; 
    const WHATSAPP_NUMBER = "5492610000000"; // Reemplazar con el número real de Mendoza
    
    // Bounds para Gran Mendoza (Luján, Maipú, Capital, Guaymallén, Godoy Cruz, Las Heras)
    const MENDOZA_BOUNDS = {
        north: -32.75,
        south: -33.10,
        west: -68.95,
        east: -68.70,
    };

    let step = 1;
    let originPlace, destPlace;
    
    // DOM Elements
    const chat = document.getElementById('chat-content');
    const originInput = document.getElementById('origin');
    const destInput = document.getElementById('destination');
    const nextBtn = document.getElementById('next-btn');
    const wsBtn = document.getElementById('ws-btn');

    // --- CARGA DINÁMICA DE GOOGLE MAPS ---
    (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.type="text/javascript";a.async=true;m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: API_KEY, v: "weekly"
    });

    async function initApp() {
        try {
            const { Geocoder } = await google.maps.importLibrary("geocoding");
            initAutocomplete();
            
            // Geolocalización Automática
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const geocoder = new Geocoder();
                        const { results } = await geocoder.geocode({ 
                            location: { lat: position.coords.latitude, lng: position.coords.longitude } 
                        });
                        if (results[0]) {
                            originInput.value = results[0].formatted_address;
                            addMessage('user', `Mi origen: ${results[0].formatted_address}`);
                            askDestination();
                        }
                    },
                    () => { 
                        originInput.placeholder = "📍 Escribe tu dirección de origen";
                        addMessage('bot', 'No pude detectar tu ubicación exacta. Por favor, escríbela abajo.');
                    }
                );
            }
        } catch (e) {
            console.error("Error inicializando:", e);
        }
    }

    async function initAutocomplete() {
        const { Autocomplete } = await google.maps.importLibrary("places");
        const options = {
            fields: ["formatted_address", "geometry"],
            types: ["address"],
            componentRestrictions: { country: "ar" },
            bounds: MENDOZA_BOUNDS,
            strictBounds: true // Limita sugerencias solo a Mendoza
        };

        const autoOrigin = new Autocomplete(originInput, options);
        const autoDest = new Autocomplete(destInput, options);

        autoOrigin.addListener('place_changed', () => { originPlace = autoOrigin.getPlace(); });
        autoDest.addListener('place_changed', () => { destPlace = autoDest.getPlace(); });
    }

    function addMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function askDestination() {
        step = 2;
        addMessage('bot', '¿A dónde quieres ir? (Sugerencias limitadas a Mendoza)');
        originInput.style.display = 'none';
        destInput.style.display = 'block';
        destInput.focus();
    }

    async function processStep() {
        if (step === 1 && originInput.value) {
            addMessage('user', originInput.value);
            askDestination();
        } else if (step === 2 && destInput.value) {
            addMessage('user', destInput.value);
            calculateTrip();
        }
    }

    async function calculateTrip() {
        const { DistanceMatrixService } = await google.maps.importLibrary("routes");
        destInput.style.display = 'none';
        nextBtn.style.display = 'none';
        addMessage('bot', 'Calculando tarifa estimada y disponibilidad...');

        const service = new DistanceMatrixService();
        try {
            const response = await service.getDistanceMatrix({
                origins: [originInput.value],
                destinations: [destInput.value],
                travelMode: google.maps.TravelMode.DRIVING,
            });

            const data = response.rows[0].elements[0];
            if (data.status === "OK") {
                const distKm = parseFloat(data.distance.text.replace(',', '.'));
                // Tarifa Mendoza (Simulada): Bajada $1200 + $100 por km
                const precio = (1200 + (distKm * 100)).toFixed(0);

                setTimeout(() => {
                    addMessage('bot', `🚕 ¡Conductores disponibles!`);
                    addMessage('bot', `Distancia: ${data.distance.text}\nTiempo: ${data.duration.text}\nPrecio Estimado: $${precio}`);
                    showWhatsApp(precio, data.distance.text);
                }, 1000);
            }
        } catch (e) {
            addMessage('bot', 'Hubo un error calculando la ruta. Intenta de nuevo.');
            nextBtn.style.display = 'block';
            destInput.style.display = 'block';
        }
    }

    function showWhatsApp(price, distance) {
        const text = `🚕 *SOLICITUD DE TAXI*\n\n` +
                     `📍 *Desde:* ${originInput.value}\n` +
                     `🏁 *Hacia:* ${destInput.value}\n` +
                     `📏 *Distancia:* ${distance}\n` +
                     `💰 *Tarifa Est.:* $${price}\n\n` +
                     `Confirmar pedido por favor.`;
        
        wsBtn.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
        wsBtn.style.display = 'block';
    }

    // Iniciar app al cargar
    initApp();
</script>

</body>
</html>
